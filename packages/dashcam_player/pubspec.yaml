name: dashcam_player
description: Low-latency RTSP dashcam player using native FFmpeg with direct surface rendering
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.7
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.dashcam.player
        pluginClass: DashcamPlayerPlugin
      ios:
        pluginClass: DashcamPlayerPlugin
